<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おくってフォトブック</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- =============================
       タイトル画像
  ============================= -->
  <section class="section-hero">
    <img src="images/meta_01.png" alt="あなたが残してくれたもの" class="hero-img">
  </section>

  <!-- =============================
       スライダー１
  ============================= -->
  <section class="section-slider slider-a">
    <div class="slider-wrap" id="sliderA">
      <div class="slider-track" id="sliderA-track">
        <!-- JS でクローンを含めて生成 -->
      </div>
      <div class="slider-dots" id="sliderA-dots"></div>
    </div>
  </section>

  <!-- =============================
       サービス概要
  ============================= -->
  <section class="section-meta">
    <img src="images/meta_02.png" alt="サービス概要" class="meta-img">
  </section>

  <!-- =============================
       スライダー２
  ============================= -->
  <section class="section-slider slider-b">
    <div class="slider-wrap" id="sliderB">
      <div class="slider-track" id="sliderB-track">
        <!-- JS でクローンを含めて生成 -->
      </div>
      <div class="slider-dots" id="sliderB-dots"></div>
    </div>
  </section>

  <!-- =============================
       サービス概要２（meta_03〜05）
  ============================= -->
  <section class="section-meta">
    <img src="images/meta_03.png" alt="サービス概要2-1" class="meta-img">
    <img src="images/meta_04.png" alt="サービス概要2-2" class="meta-img">
    <img src="images/meta_05.png" alt="サービス概要2-3" class="meta-img">
    <img src="images/meta_05a.png" alt="サービス概要2-4" class="meta-img">
  </section>

  <!-- =============================
       コース（meta_06〜07）
  ============================= -->
  <section class="section-meta">
    <img src="images/meta_06.png" alt="コース1" class="meta-img">
    <img src="images/meta_07.png" alt="コース2" class="meta-img">
  </section>

  <!-- =============================
       仕上がりタイプ（meta_08）
  ============================= -->
  <section class="section-meta">
    <img src="images/meta_08.jpg" alt="仕上がりタイプ" class="meta-img">
  </section>

  <!-- =============================
       事例紹介（meta_09）
  ============================= -->
  <section class="section-meta">
    <img src="images/meta_09.jpg" alt="事例紹介" class="meta-img">
  </section>

  <!-- =============================
       よくある質問（meta_13〜14）
  ============================= -->
  <section class="section-meta">
    <img src="images/meta_13.png" alt="よくある質問1" class="meta-img">
    <img src="images/meta_14.png" alt="よくある質問2" class="meta-img">
  </section>

  <!-- =============================
       固定フッターナビ
  ============================= -->
  <div class="fixed-footer">
    <img src="images/underver.png" alt="ナビゲーション" class="fixed-footer-img">
  </div>

  <!-- 価格表ボタン（固定・フッターと独立） -->
  <button class="btn-kakaku" id="btnKakaku" aria-label="価格表を見る">価格表</button>

  <!-- 固定フッター分の余白 -->
  <div class="fixed-footer-spacer"></div>

  <!-- =============================
       価格表モーダル（下からスライドアップ）
  ============================= -->
  <div class="kakaku-overlay" id="kakakuOverlay"></div>
  <div class="kakaku-sheet" id="kakakuSheet">
    <button class="kakaku-close" id="kakakuClose" aria-label="閉じる">✕</button>
    <div class="kakaku-scroll">
      <img src="images/kakaku.png" alt="料金表" class="kakaku-img">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
