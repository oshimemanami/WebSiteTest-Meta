<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おくってフォトブック</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- =============================
       スタート画像
  ============================= -->
  <section class="section-hero">
    <img src="images/meta_start.png" alt="おくってフォトブック" class="hero-img">
  </section>

  <!-- =============================
       タイトル画像
  ============================= -->
  <section class="section-hero">
    <img src="images/meta_01.png" alt="あなたが残してくれたもの" class="hero-img">
  </section>

  <!-- =============================
       スライダー１
  ============================= -->
  <section class="section-slider slider-a">
    <div class="slider-outer">
      <div class="slider-wrap" id="sliderA">
        <div class="slider-track" id="sliderA-track"></div>
      </div>
      <button class="slider-btn slider-btn-prev" id="sliderA-prev" aria-label="前へ">&#10094;</button>
      <button class="slider-btn slider-btn-next" id="sliderA-next" aria-label="次へ">&#10095;</button>
    </div>
    <div class="slider-dots" id="sliderA-dots"></div>
  </section>

  <!-- =============================
       サービス概要
  ============================= -->
  <section class="section-meta">
    <img src="images/meta_02.png" alt="サービス概要" class="meta-img">
  </section>

  <!-- =============================
       スライダー２
  ============================= -->
  <section class="section-slider slider-b">
    <div class="slider-outer">
      <div class="slider-wrap" id="sliderB">
        <div class="slider-track" id="sliderB-track"></div>
      </div>
      <button class="slider-btn slider-btn-prev" id="sliderB-prev" aria-label="前へ">&#10094;</button>
      <button class="slider-btn slider-btn-next" id="sliderB-next" aria-label="次へ">&#10095;</button>
    </div>
    <div class="slider-dots" id="sliderB-dots"></div>
  </section>

  <!-- =============================
       サービス概要２（meta_03〜05）
  ============================= -->
  <section class="section-meta" id="section-meta03">
    <img src="images/meta_03.png" alt="サービス概要2-1" class="meta-img">
    <!-- meta_04 → meta_04a・meta_04b 横並び -->
    <div class="btn-row">
      <a href="https://okutte.jp/soudanmadoguchi.html" class="btn-row-link">
        <img src="images/meta_04a.png" alt="私の場合を相談する" class="btn-row-img">
      </a>
      <a href="#" class="btn-row-link" id="btnKakaku04b">
        <img src="images/meta_04b.png" alt="料金表を見る" class="btn-row-img">
      </a>
    </div>
    <img src="images/meta_05.png" alt="サービス概要2-3" class="meta-img">
    <a href="https://okutte.jp/" class="meta-link">
      <img src="images/meta_05a.png" alt="おくってフォトブックへ" class="meta-img">
    </a>
  </section>

  <!-- =============================
       コース（meta_06〜07）
  ============================= -->
  <section class="section-meta" id="section-meta06">
    <img src="images/meta_06.png" alt="コース1" class="meta-img">
    <div class="btn-row">
      <a href="https://okutte.jp/soudanmadoguchi.html" class="btn-row-link">
        <img src="images/meta_04a.png" alt="私の場合を相談する" class="btn-row-img">
      </a>
      <a href="#" class="btn-row-link" id="btnKakaku06b">
        <img src="images/meta_04b.png" alt="料金表を見る" class="btn-row-img">
      </a>
    </div>
    <img src="images/meta_05.png" alt="コース補足" class="meta-img">
    <a href="https://okutte.jp/" class="meta-link">
      <img src="images/meta_05a.png" alt="おくってフォトブックへ" class="meta-img">
    </a>
  </section>

  <!-- =============================
       仕上がりタイプ（meta_08）
  ============================= -->
  <section class="section-meta" id="section-meta08">
    <div class="meta-gif-wrap">
      <img src="images/meta_08.png" alt="仕上がりタイプ" class="meta-img">
      <img src="images/soft_mekuru-img.gif" alt="" class="meta-gif-overlay">
    </div>
  </section>

  <!-- =============================
       事例紹介（meta_09）
  ============================= -->
  <section class="section-meta" id="section-meta09">
    <img src="images/meta_09.png" alt="事例紹介" class="meta-img">
  </section>

  <!-- =============================
       よくある質問（meta_13〜14）
  ============================= -->
  <section class="section-meta">
    <img src="images/meta_13.png" alt="よくある質問1" class="meta-img">
    <!-- meta_13a：タップで meta_13b がすっと展開 -->
    <div class="faq-accordion" id="faqAccordion">
      <div class="faq-question" id="faqQuestion">
        <img src="images/meta_13a.png" alt="Q フォトブックだけでなくデータも残せますか？" class="meta-img faq-q-img">
        <span class="faq-arrow" id="faqArrow">&#8964;</span>
      </div>
      <div class="faq-answer" id="faqAnswer">
        <img src="images/meta_13b.png" alt="A はい。フォトブックに使用したお写真は、データとしてもお渡しします。" class="meta-img">
      </div>
    </div>
    <img src="images/meta_14.png" alt="よくある質問2" class="meta-img">
    <!-- meta_04a・meta_04b 横並び -->
    <div class="btn-row">
      <a href="https://okutte.jp/soudanmadoguchi.html" class="btn-row-link">
        <img src="images/meta_04a.png" alt="私の場合を相談する" class="btn-row-img">
      </a>
      <a href="#" class="btn-row-link" id="btnKakaku14b">
        <img src="images/meta_04b.png" alt="料金表を見る" class="btn-row-img">
      </a>
    </div>
    <img src="images/meta_05.png" alt="補足" class="meta-img">
    <a href="https://okutte.jp/" class="meta-link">
      <img src="images/meta_05a.png" alt="おくってフォトブックへ" class="meta-img">
    </a>
  </section>

  <!-- =============================
       meta_15
  ============================= -->
  <section class="section-meta">
    <img src="images/meta_15.png" alt="meta_15" class="meta-img">
  </section>

  <!-- =============================
       固定フッターナビ
  ============================= -->
  <div class="fixed-footer" id="fixedFooter">
    <img src="images/underver.png" alt="ナビゲーション" class="fixed-footer-img" usemap="#footerMap" id="footerImg">
    <map name="footerMap">
      <area shape="rect" coords="0,0,0,0" href="#section-meta06" alt="3つのコース" id="areaCorner">
      <area shape="rect" coords="0,0,0,0" href="#section-meta08" alt="仕上がりタイプ" id="areaFinish">
      <area shape="rect" coords="0,0,0,0" href="#section-meta09" alt="事例紹介" id="areaCase">
      <area shape="rect" coords="0,0,0,0" href="https://okutte.jp/soudanmadoguchi.html" alt="お問い合わせ" id="areaContact">
    </map>
  </div>

  <!-- 固定フッター分の余白 -->
  <div class="fixed-footer-spacer"></div>

  <!-- =============================
       価格表モーダル（下からスライドアップ）
  ============================= -->
  <div class="kakaku-overlay" id="kakakuOverlay"></div>
  <div class="kakaku-sheet" id="kakakuSheet">
    <button class="kakaku-close" id="kakakuClose" aria-label="閉じる">✕</button>
    <div class="kakaku-scroll">
      <img src="images/kakaku_01.png" alt="料金表1" class="kakaku-img">
      <a href="https://okutte.jp/kakaku.html" class="meta-link">
        <img src="images/kakaku_02.png" alt="料金表2" class="kakaku-img">
      </a>
      <img src="images/kakaku_03.png" alt="料金表3" class="kakaku-img">
      <a href="https://okutte.jp/kakaku.html" class="meta-link">
        <img src="images/kakaku_02.png" alt="料金表2" class="kakaku-img">
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
